<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadatro Morador</title>
    <link rel="stylesheet" href="estilos/CadatroMoradorSyle.css">
</head>
<body>
    
        <div class="header">
            <h1>Portaria inteligente</h1>
        </div>
        <div class="container">
        <div class="form-container">
            <h2>Valida e cadastra moradores e visitantes</h2>
            <form action="process.php" method="POST">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" required>
                
                <label for="cpf">CPF/Código de Validação</label>
                <input type="text" id="cpf" name="cpf" required>
                
                <div class="buttons">
                    <button type="submit" name="action" value="validar">Validar</button>
                    <button type="submit" name="action" value="cadastrar">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
