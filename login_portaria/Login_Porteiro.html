<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Porteiro</title>
    <link rel="stylesheet" href="Login_Porteirosyle.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login do Porteiro</h1>
        </div>
        <div class="form-container">
            <form action="process_login_do_porteiro.php" method="POST">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" required>
                
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>

                <div class="buttons">
                    <button type="submit">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
